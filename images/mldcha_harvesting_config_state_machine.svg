<svg width="100%" viewBox="0 0 680 980" xmlns="http://www.w3.org/2000/svg" role="img">
<title>MLDCHA Harvesting Configuration and State Machine Pipeline</title>
<desc>Detailed architecture showing the harvesting config file structure, connector types, and state machine orchestration at the beginning of the MLDCH pipeline</desc>

<style>
