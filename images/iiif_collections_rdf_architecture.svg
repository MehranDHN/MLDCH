<svg width="100%" viewBox="0 0 680 1020" xmlns="http://www.w3.org/2000/svg">
<title>IIIF Collections Architecture with RDF Pipeline</title>
<desc>Detailed architecture showing IIIF Collection hierarchy, bidirectional linking with partOf and items arrays, preservation of original manifests, and RDF knowledge graph generation workflow</desc>

<style>
.c-blue rect, .c-blue circle { fill: #E6F1FB; stroke: #185FA5; }
.c-purple rect, .c-purple circle { fill: #EEEDFE; stroke: #534AB7; }
.c-teal rect, .c-teal circle { fill: #E1F5EE; stroke: #0F6E56; }
.c-coral rect, .c-coral circle { fill: #FAECE7; stroke: #993C1D; }
.c-pink rect, .c-pink circle { fill: #FBEAF0; stroke: #993556; }
.c-amber rect, .c-amber circle { fill: #FAEEDA; stroke: #854F0B; }
.c-green rect, .c-green circle { fill: #EAF3DE; stroke: #3B6D11; }
.c-gray rect, .c-gray circle { fill: #F1EFE8; stroke: #5F5E5A; }

.c-blue .th, .c-blue .t { fill: #042C53; }
.c-blue .ts { fill: #0C447C; }
.c-purple .th, .c-purple .t { fill: #26215C; }
.c-purple .ts { fill: #3C3489; }
.c-teal .th, .c-teal .t { fill: #04342C; }
.c-teal .ts { fill: #085041; }
.c-coral .th, .c-coral .t { fill: #4A1B0C; }
.c-coral .ts { fill: #712B13; }
.c-pink .th, .c-pink .t { fill: #4B1528; }
.c-pink .ts { fill: #72243E; }
.c-amber .th, .c-amber .t { fill: #412402; }
.c-amber .ts { fill: #633806; }
.c-green .th, .c-green .t { fill: #173404; }
.c-green .ts { fill: #27500A; }
.c-gray .th, .c-gray .t { fill: #2C2C2A; }
.c-gray .ts { fill: #444441; }

.th { font-family: sans-serif; font-size: 14px; font-weight: 500; fill: #2C2C2A; }
.ts { font-family: sans-serif; font-size: 12px; font-weight: 400; fill: #444441; }
.t { font-family: sans-serif; font-size: 14px; font-weight: 400; fill: #2C2C2A; }
.arr { stroke: #888780; stroke-width: 1.5; fill: none; }
.node { cursor: pointer; }
.node:hover rect { opacity: 0.85; }

@media (prefers-color-scheme: dark) {
  .c-blue rect, .c-blue circle { fill: #0C447C; stroke: #B5D4F4; }
  .c-purple rect, .c-purple circle { fill: #3C3489; stroke: #CECBF6; }
  .c-teal rect, .c-teal circle { fill: #085041; stroke: #9FE1CB; }
  .c-coral rect, .c-coral circle { fill: #712B13; stroke: #F5C4B3; }
  .c-pink rect, .c-pink circle { fill: #72243E; stroke: #F4C0D1; }
  .c-amber rect, .c-amber circle { fill: #633806; stroke: #FAC775; }
  .c-green rect, .c-green circle { fill: #27500A; stroke: #C0DD97; }
  
  .c-blue .th, .c-blue .t { fill: #E6F1FB; }
  .c-blue .ts { fill: #85B7EB; }
  .c-purple .th, .c-purple .t { fill: #EEEDFE; }
  .c-purple .ts { fill: #AFA9EC; }
  .c-teal .th, .c-teal .t { fill: #E1F5EE; }
  .c-teal .ts { fill: #5DCAA5; }
  .c-coral .th, .c-coral .t { fill: #FAECE7; }
  .c-coral .ts { fill: #F0997B; }
  .c-pink .th, .c-pink .t { fill: #FBEAF0; }
  .c-pink .ts { fill: #ED93B1; }
  .c-amber .th, .c-amber .t { fill: #FAEEDA; }
  .c-amber .ts { fill: #EF9F27; }
  .c-green .th, .c-green .t { fill: #EAF3DE; }
  .c-green .ts { fill: #97C459; }
  
  .th { fill: #C2C0B6; }
  .ts { fill: #9C9A92; }
  .arr { stroke: #73726C; }
}
</style>

<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arrow-bi" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6">
    <path d="M2 1L5 5L2 9M8 1L5 5L8 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Title -->
<text class="th" x="340" y="30" text-anchor="middle" style="font-size: 16px;">IIIF Collections as Source of Truth</text>

<!-- Root Collection -->
<g class="c-purple">
  <rect x="220" y="60" width="240" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="80" text-anchor="middle">Root Collection</text>
  <text class="ts" x="340" y="100" text-anchor="middle">collections: [] + partOf: null</text>
</g>

<!-- Bidirectional arrow label -->
<text class="ts" x="340" y="140" text-anchor="middle">Bidirectional linking</text>

<!-- Arrow down to sub-collections -->
<line x1="340" y1="116" x2="340" y2="170" class="arr" marker-end="url(#arrow-bi)"/>

<!-- Sub-Collections Layer -->
<g class="c-blue">
  <rect x="60" y="170" width="160" height="56" rx="6" stroke-width="0.5"/>
  <text class="th" x="140" y="190" text-anchor="middle">By Subject</text>
  <text class="ts" x="140" y="210" text-anchor="middle">Islamic Manuscripts</text>
</g>

<g class="c-blue">
  <rect x="260" y="170" width="160" height="56" rx="6" stroke-width="0.5"/>
  <text class="th" x="340" y="190" text-anchor="middle">By Place</text>
  <text class="ts" x="340" y="210" text-anchor="middle">Isfahan</text>
</g>

<g class="c-blue">
  <rect x="460" y="170" width="160" height="56" rx="6" stroke-width="0.5"/>
  <text class="th" x="540" y="190" text-anchor="middle">By Period</text>
  <text class="ts" x="540" y="210" text-anchor="middle">Safavid Era</text>
</g>

<!-- partOf arrows going up -->
<line x1="140" y1="170" x2="280" y2="116" class="arr" marker-end="url(#arrow)" stroke-dasharray="3 2" opacity="0.5"/>
<line x1="340" y1="170" x2="340" y2="116" class="arr" marker-end="url(#arrow)" stroke-dasharray="3 2" opacity="0.5"/>
<line x1="540" y1="170" x2="400" y2="116" class="arr" marker-end="url(#arrow)" stroke-dasharray="3 2" opacity="0.5"/>

<!-- Label for partOf -->
<text class="ts" x="180" y="135" text-anchor="start" opacity="0.7">partOf</text>

<!-- Manifest Entry Container (detailed view) -->
<g class="c-teal">
  <rect x="40" y="270" width="600" height="280" rx="12" stroke-width="0.5"/>
  <text class="th" x="340" y="300" text-anchor="middle">IIIF Collection Entry (items array)</text>
  <text class="ts" x="340" y="318" text-anchor="middle">Enrichment layer + pointer to original manifest</text>
</g>

<!-- Original Manifest (preserved) -->
<g class="node c-pink">
  <rect x="70" y="340" width="220" height="66" rx="6" stroke-width="0.5"/>
  <text class="th" x="180" y="360" text-anchor="middle">Original GLAM Manifest</text>
  <text class="ts" x="180" y="380" text-anchor="middle">https://bl.org/iiif/ms123</text>
  <text class="ts" x="180" y="396" text-anchor="middle">Preserved untouched</text>
</g>

<!-- Enriched Metadata in Collection Entry -->
<g class="c-amber">
  <rect x="320" y="340" width="290" height="190" rx="6" stroke-width="0.5"/>
  <text class="th" x="465" y="360" text-anchor="middle">Collection Entry Metadata</text>
  
  <text class="ts" x="335" y="385" text-anchor="start">Wikidata: Q3114572</text>
  <text class="ts" x="335" y="405" text-anchor="start">AAT Subject: 300265821</text>
  <text class="ts" x="335" y="425" text-anchor="start">TGN Place: Isfahan (7001535)</text>
  <text class="ts" x="335" y="445" text-anchor="start">LCSH: Epic poetry, Persian</text>
  
  <text class="th" x="335" y="470" text-anchor="start" style="font-size: 11px;">seeAlso:</text>
  <text class="ts" x="335" y="490" text-anchor="start">mldcha.org/rdf/ms123.ttl</text>
  <text class="ts" x="335" y="510" text-anchor="start">format: text/turtle</text>
</g>

<!-- Arrow from original to enrichment -->
<line x1="290" y1="373" x2="320" y2="373" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="305" y="368" text-anchor="middle">references</text>

<!-- Bottom Section: RDF Pipeline -->
<g class="c-green">
  <rect x="40" y="590" width="600" height="400" rx="12" stroke-width="0.5"/>
  <text class="th" x="340" y="620" text-anchor="middle">RDF Knowledge Graph Generation Pipeline</text>
  <text class="ts" x="340" y="638" text-anchor="middle">Collections as entry point for Google Colab notebooks</text>
</g>

<!-- Step 1: Fetch Root Collection -->
<g class="node c-blue">
  <rect x="70" y="660" width="540" height="44" rx="6" stroke-width="0.5"/>
  <text class="th" x="340" y="685" text-anchor="middle">Step 1: Fetch root collection JSON</text>
</g>

<line x1="340" y1="704" x2="340" y2="724" class="arr" marker-end="url(#arrow)"/>

<!-- Step 2: Recursive Traversal -->
<g class="node c-blue">
  <rect x="70" y="724" width="540" height="56" rx="6" stroke-width="0.5"/>
  <text class="th" x="340" y="744" text-anchor="middle">Step 2: Recursive traversal</text>
  <text class="ts" x="340" y="764" text-anchor="middle">Navigate collections array + extract manifest entries</text>
</g>

<line x1="340" y1="780" x2="340" y2="800" class="arr" marker-end="url(#arrow)"/>

<!-- Step 3: Extract Enrichment -->
<g class="node c-blue">
  <rect x="70" y="800" width="540" height="56" rx="6" stroke-width="0.5"/>
  <text class="th" x="340" y="820" text-anchor="middle">Step 3: Extract enrichment from metadata</text>
  <text class="ts" x="340" y="840" text-anchor="middle">Parse AAT, TGN, Wikidata, LCSH URIs</text>
</g>

<line x1="340" y1="856" x2="340" y2="876" class="arr" marker-end="url(#arrow)"/>

<!-- Step 4: Build RDF Graph -->
<g class="node c-blue">
  <rect x="70" y="876" width="540" height="56" rx="6" stroke-width="0.5"/>
  <text class="th" x="340" y="896" text-anchor="middle">Step 4: Build RDF graph</text>
  <text class="ts" x="340" y="916" text-anchor="middle">Create triples with bidirectional relationships</text>
</g>

<line x1="340" y1="932" x2="340" y2="952" class="arr" marker-end="url(#arrow)"/>

<!-- Output: Knowledge Graph -->
<g class="node c-coral">
  <rect x="200" y="952" width="280" height="44" rx="6" stroke-width="0.5"/>
  <text class="th" x="340" y="977" text-anchor="middle">Output: Unified Knowledge Graph</text>
</g>

</svg>